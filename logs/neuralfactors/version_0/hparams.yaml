model_config: !!python/object:src.utils.config.ModelConfig
  activation: gelu
  d_static: 3
  d_ts: 12
  dropout: 0.25
  encoder_config: !!python/object:src.utils.config.EncoderConfig
    eps: 1.0e-08
    jitter_init: 0.0001
    jitter_max: 10.0
    jitter_multiplier: 2.0
    use_fp64: true
  hidden_size: 256
  lookback: 256
  nhead: 4
  nu_offset: 4.0
  num_factors: 64
  num_layers: 2
  prior_config: !!python/object:src.utils.config.PriorConfig
    mu_z_init: 0.0
    nu_z_init: 10.0
    sigma_z_init: 10.0
  sigma_eps: 1.0e-06
  use_fp64: false
training_config: !!python/object:src.utils.config.TrainingConfig
  batch_size: 1
  checkpoint_dir: checkpoints\neuralfactors
  device: cuda
  learning_rate: 0.0001
  log_dir: logs
  max_steps: 18000
  normalize_returns: true
  num_iwae_samples: 20
  polyak_alpha: 0.999
  polyak_start_step: 9000
  returns_std: !!python/object/apply:numpy._core.multiarray.scalar
  - !!python/object/apply:numpy.dtype
    args:
    - f8
    - false
    - true
    state: !!python/tuple
    - 3
    - <
    - null
    - null
    - null
    - -1
    - -1
    - 0
  - !!binary |
    xPnTkI8LsD8=
  seed: 42
  use_polyak: true
  val_every_n_steps: 10000
  weight_decay: 1.0e-06
